# "Does loss actually decline?" probe — no gradient accumulation, smallest
# legal config that still exercises every piece of the pipeline.
#
# Goal: see real gradient signal (non-zero loss, non-zero grad_norm) with
# the same model + executor + judge stack as the paper run, just at a scale
# where we can iterate. If loss declines here, scale up.

model: Qwen/Qwen3-8B
output_dir: ./output/loss-check

epochs: 1
num_episodes: 16                  # 16/batch=2 → 8 optimizer steps
batch_size: 2                     # paper-style per_device, no grad accum
gradient_accumulation_steps: 1    # ← the smallest thing that proves learning
learning_rate: 1.0e-6
num_generations: 8                # paper GRPO group size — needed for advantage variance
max_completion_length: 4096       # paper value — don't truncate skill content
temperature: 1.0
beta: 0.001                       # paper KL coefficient (GRPO term in TRL = `beta`)

use_vllm: false

use_lora: true
lora_r: 32
lora_alpha: 64

enable_thinking: false

# Remote executor + judge — keeps local GPU 100% on curator training
executor:
  type: infsh
  app: openrouter/qwen3-8b
  history_length: 3
  temperature: 0.7
  max_tokens: 256
  context_size: 8192

judge:
  type: infsh
  app: openrouter/qwen3-32b
  temperature: 0.0
  max_tokens: 256
  context_size: 8192

logging_steps: 1
report_to: wandb

save_strategy: steps
save_steps: 1
save_total_limit: 3

wandb_run_name: loss-check
