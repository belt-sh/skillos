# SkillOS Algorithm 1 — SMOKE config. One opt step, heuristic executor/judge,
# tiny G, tiny GRPO group. Verifies TRL tool discovery + tool-call loop + the
# new mega-tool schema end to end on a single GPU. Not a real training run.

model: Qwen/Qwen3-8B
output_dir: ./output/algo1-smoke

epochs: 1
max_steps: 1
num_episodes: 16
batch_size: 1
gradient_accumulation_steps: 2  # matches configs/accelerate_zero2.yaml
learning_rate: 1.0e-6
num_generations: 2
max_completion_length: 1024
temperature: 1.0
beta: 0.0

group_size: 2

use_vllm: true
vllm_mode: colocate
vllm_gpu_memory_utilization: 0.4

use_lora: false
enable_thinking: false

executor:
  type: heuristic

judge:
  type: heuristic

logging_steps: 1
report_to: none

save_strategy: "no"
