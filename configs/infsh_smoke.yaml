# Tiny end-to-end test with the inference.sh executor + judge.
# Bound at ~2 prompts × 2 rollouts × 3 executor steps = 12 executor calls total.
# Plus a few judge calls if curator emits any valid skill content.
# Keeps cost under a few cents so we can validate the wiring under load.

model: Qwen/Qwen3-0.6B
output_dir: ./output/infsh-smoke

epochs: 1
num_episodes: 2
batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1.0e-6
num_generations: 2
max_completion_length: 512
temperature: 1.0

use_vllm: false

use_lora: true
lora_r: 8
lora_alpha: 16

enable_thinking: false

executor:
  type: infsh
  app: openrouter/qwen3-8b
  history_length: 3
  temperature: 0.7
  max_tokens: 128

judge:
  type: infsh
  app: openrouter/qwen3-32b
  temperature: 0.0
  max_tokens: 128

logging_steps: 1
report_to: wandb

save_strategy: steps
save_steps: 1
save_total_limit: 2

wandb_run_name: infsh-smoke
