# DeepSpeed ZeRO-3 for 8B FULL fine-tuning + KL ref model on 8×H100.
# THE working FFT path on this stack (trl 1.4 / transformers 5.9 / deepspeed
# 0.19): a 2026-06-21 smoke ran clean (FFT+KL peaks 65.5/81.5GB, step closes,
# generation progresses under vLLM colocate). ZeRO-2 + vLLM — which older notes
# call "validated" — HUNG here (GPUs 0%, 42min no progress). ZeRO-3 shards
# params + ref model, so beta=0.001 fits. Residual risk: per-step vLLM
# weight-gather under sharded params — watch the reward/KL trend to confirm.
# ZeRO-3 shards PARAMS (not just optimizer+grads like ZeRO-2), so the replicated
# 16GB param copy that OOM'd v6 (FFT+KL under ZeRO-2) drops to ~2GB/rank. The KL
# reference model is also sharded, sidestepping both the v6 OOM and the TRL+FSDP
# ref-device bug noted in configs/alfworld_8xh100_fft.yaml. TRL gathers params
# for the vLLM-colocate generation phase each step (the extra all-gather is the
# wall-time tax FFT pays vs LoRA).
distributed_type: DEEPSPEED
num_processes: 8
mixed_precision: bf16
deepspeed_config:
  deepspeed_multinode_launcher: standard
  zero_stage: 3
  gradient_accumulation_steps: 2
  gradient_clipping: 1.0
  zero3_init_flag: true
  zero3_save_16bit_model: true
  offload_optimizer_device: none
  offload_param_device: none
