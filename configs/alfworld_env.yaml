# ALFWorld environment config
# Based on alfworld's base_config.yaml

dataset:
  data_path: "$ALFWORLD_DATA/json_2.1.1/train"
  eval_id_data_path: "$ALFWORLD_DATA/json_2.1.1/valid_seen"
  eval_ood_data_path: "$ALFWORLD_DATA/json_2.1.1/valid_unseen"
  num_train_games: -1
  num_eval_games: -1

logic:
  domain: "$ALFWORLD_DATA/logic/alfred.pddl"
  grammar: "$ALFWORLD_DATA/logic/alfred.twl2"

env:
  type: "AlfredTWEnv"
  regen_game_files: false
  domain_randomization: false
  task_types: [1, 2, 3, 4, 5, 6]
  goal_desc_human_anns_prob: 0.0
  expert_timeout_steps: 150
  expert_type: "handcoded"

  feedback:
    inventory: false
    description: false
    ambient: false

controller:
  type: "oracle"
  argmax: false

general:
  random_seed: 42
  use_cuda: false
  visdom: false
  training_method: "dagger"

dagger:
  training:
    batch_size: 64
    max_episode: 50000
    max_nb_steps_per_episode: 50
    smoothing_eps: 0.1
  evaluate:
    run_eval: true
    batch_size: 64
    env:
      type: "AlfredTWEnv"

rl:
  training:
    batch_size: 64
    max_episode: 50000
  evaluate:
    run_eval: true
    batch_size: 64
    env:
      type: "AlfredTWEnv"
